name: Feynd
options:
  bundleIdPrefix: com.bartdecrem
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: 274T5WCVD2
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  Feynd:
    type: application
    platform: iOS
    sources:
      - path: Feynd
        excludes:
          - "Secrets.swift.example"
    info:
      path: Feynd/Info.plist
      properties:
        CFBundleDisplayName: Feynd
        NSMicrophoneUsageDescription: "Feynd uses the microphone so you can talk with the tutor out loud."
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bartdecrem.Feynd
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
