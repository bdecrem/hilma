name: LearnAI
options:
  bundleIdPrefix: com.bartdecrem
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: 274T5WCVD2
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: minimal

packages:
  RealtimeAPI:
    url: https://github.com/m1guelpf/swift-realtime-openai
    branch: main

targets:
  LearnAI:
    type: application
    platform: iOS
    sources:
      - path: LearnAI
        excludes:
          - "Secrets.swift.example"
    info:
      path: LearnAI/Info.plist
      properties:
        CFBundleDisplayName: LearnAI
        NSMicrophoneUsageDescription: "LearnAI uses the microphone to hold realtime voice conversations about AI."
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.bartdecrem.LearnAI
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: RealtimeAPI
        product: RealtimeAPI
