app = 'bore-relay'
primary_region = 'sjc'

[build]

[env]
  PORT = '4040'
  BASE_DOMAIN = 'bore.cx'

[http_service]
  internal_port = 4040
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

# TCP port range for SSH/TCP tunnels
# PROXY protocol v2 tells the relay which external port was connected to
[[services]]
  internal_port = 4041
  protocol = 'tcp'

  [[services.ports]]
    handlers = ['proxy_proto']
    start_port = 10000
    end_port = 60000
    proxy_proto_options = { version = 'v2' }

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
