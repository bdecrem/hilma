name: Deploy bore relay

on:
  push:
    branches: [main]
    paths:
      - 'apps/tunnel/relay/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --app bore-relay
        working-directory: apps/tunnel/relay
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
