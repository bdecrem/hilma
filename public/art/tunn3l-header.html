<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>tunn3l — header</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }
  .header {
    width: 1500px;
    height: 500px;
    background: linear-gradient(135deg, #1a1a18, #2a2218);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  /* Subtle grid lines — like a terminal/tunnel */
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      repeating-linear-gradient(90deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 60px),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 60px);
  }
  .logo {
    font-family: system-ui, -apple-system, sans-serif;
    font-weight: 800;
    font-size: 96px;
    letter-spacing: -0.02em;
    color: #fff;
    position: relative;
    z-index: 1;
  }
  .logo .green { color: #B4E33D; }
  .logo .ext { color: rgba(255,255,255,0.35); }
  .tagline {
    position: absolute;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    font-family: monospace;
    font-size: 18px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 0.02em;
    z-index: 1;
    white-space: nowrap;
  }
  /* Terminal dots top-left */
  .dots {
    position: absolute;
    top: 32px;
    left: 40px;
    display: flex;
    gap: 8px;
    z-index: 1;
  }
  .dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    opacity: 0.4;
  }
  /* Green glow behind text */
  .glow {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(180,227,61,0.06) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 0;
  }
</style>
</head>
<body>
<div class="header">
  <div class="glow"></div>
  <div class="dots">
    <div class="dot" style="background:#FF4E50"></div>
    <div class="dot" style="background:#F9D423"></div>
    <div class="dot" style="background:#B4E33D"></div>
  </div>
  <div class="logo">tunn<span class="green">3l</span><span class="ext">.sh</span></div>
  <div class="tagline">the tunnel service built for AI agents</div>
</div>
</body>
</html>
