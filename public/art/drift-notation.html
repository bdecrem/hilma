<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="Drift Notation">
  <meta property="og:description" content="Three attractors pull 150 particles through a brightness field, transcribed in monospace — a score for movement no instrument can play">
  <meta property="og:image" content="https://hilma-nine.vercel.app/art/drift-notation-og.png">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <title>Drift Notation</title>
  <style>
    * { box-sizing: border-box; margin: 0; }
    html, body { background: #06060a; color: #ddd8d0; min-height: 100dvh; }
    body {
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 32px 20px 60px;
    }
    .art-box {
      width: min(600px, calc(100vw - 40px));
      height: calc(28 * 16px + 28px);
      border: 1px solid rgba(255,255,255,0.05); border-radius: 10px;
      padding: 14px; background: rgba(0,0,0,0.4); overflow: hidden;
      box-shadow: inset 0 0 30px rgba(0,0,0,0.5), 0 4px 20px rgba(0,0,0,0.3);
    }
    .art-row {
      display: block;
      width: fit-content;
      margin-inline: auto;
      white-space: pre;
      font: 400 14px/16px "Courier New", Courier, monospace;
      color: rgba(130,155,210,0.7);
    }
    .source-canvas { display: none; }
    .credit {
      position: fixed; bottom: 12px; right: 16px; z-index: 20;
      font: 400 11px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: rgba(255,255,255,0.28); text-decoration: none;
    }
    .credit:hover { color: rgba(255,255,255,0.44); }
    .w3, .w5, .w8, .it, .a1, .a2, .a3, .a4, .a5, .a6, .a7, .a8, .a9, .a10 { display: none; }
  </style>
</head>
<body>
  <div class="art-box" id="mono-box"></div>
  <div id="source-box" style="display:none"></div>
  <div id="prop-box" style="display:none"></div>
  <a class="credit" href="https://x.com/somnai_dreams" target="_blank" rel="noreferrer">@somnai_dreams × hilma</a>
  <script type="module" src="./drift-notation.js"></script>
</body>
</html>
