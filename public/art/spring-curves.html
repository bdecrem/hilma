<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Spring Awakening</title>
  <style>
    body {
      margin: 0;
      background-color: #2D9596; /* Teal background */
    }
    #canvas {
      width: 100%;
      height: 100vh;
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let curves = [];
    let mouseTrail = [];

    // Define a limited, harmonious color palette
    const palette = [
      { hue: 120, saturation: 70, lightness: 60 }, // Green
      { hue: 40, saturation: 80, lightness: 70 }, // Yellow
      { hue: 320, saturation: 60, lightness: 80 }, // Pink
      { hue: 200, saturation: 70, lightness: 50 }, // Blue
    ];

    function Curve(x, y) {
      this.x = x;
      this.y = y;
      this.vx = Math.random() * 2 - 1;
      this.vy = Math.random() * 2 - 1;
      this.length = Math.random() * 100 + 50;
      this.colorIndex = Math.floor(Math.random() * palette.length);
      this.points = [];
      for (let i = 0; i < this.length; i++) {
        this.points.push({
          x: x + Math.sin(i / 10) * i,
          y: y + Math.cos(i / 10) * i
        });
      }
    }

    Curve.prototype.update = function() {
      this.x += this.vx;
      this.y += this.vy;
      if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
      if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
      this.points = [];
      for (let i = 0; i < this.length; i++) {
        this.points.push({
          x: this.x + Math.sin(i / 10 + this.x / 100) * i,
          y: this.y + Math.cos(i / 10 + this.y / 100) * i
        });
      }
    };

    Curve.prototype.draw = function() {
      const color = palette[this.colorIndex];
      ctx.beginPath();
      ctx.moveTo(this.points[0].x, this.points[0].y);
      for (let i = 1; i < this.length; i++) {
        ctx.lineTo(this.points[i].x, this.points[i].y);
      }
      ctx.strokeStyle = `hsl(${color.hue}, ${color.saturation}%, ${color.lightness}%)`;
      ctx.lineWidth = 2 + Math.sin(this.x / 100) * 2; // Vary line width
      ctx.stroke();
    };

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let i = 0; i < curves.length; i++) {
        curves[i].update();
        curves[i].draw();
      }
      for (let i = 0; i < mouseTrail.length; i++) {
        mouseTrail[i].update();
        mouseTrail[i].draw();
      }
      requestAnimationFrame(animate);
    }

    canvas.addEventListener('mousemove', function(e) {
      const x = e.clientX;
      const y = e.clientY;
      mouseTrail.push(new Curve(x, y));
      if (mouseTrail.length > 100) mouseTrail.shift();
    });

    for (let i = 0; i < 50; i++) {
      curves.push(new Curve(Math.random() * canvas.width, Math.random() * canvas.height));
    }

    animate();
  </script>
</body>
</html>
