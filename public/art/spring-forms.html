<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>spring forms</title>
  <meta property="og:title" content="spring forms">
  <meta property="og:description" content="playful shapes in citrus light">
  <meta property="og:image" content="https://hilma-nine.vercel.app/art/spring-forms-og.png">
  <meta property="og:url" content="https://hilma-nine.vercel.app/art/spring-forms.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="spring forms">
  <meta name="twitter:image" content="https://hilma-nine.vercel.app/art/spring-forms-og.png">
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: #FFF;
    }
    #canvas {
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let background;
    let shapes = [];
    let ripple = null;
    let trail = null;
    let pulse = null;
    let zest = [];

    function init() {
      background = getRandomBackground();
      for (let i = 0; i < 100; i++) {
        shapes.push(getRandomShape());
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (background.type === 'solid') {
        ctx.fillStyle = background.color;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      } else {
        let start = hexToRgb(background.start);
        let end = hexToRgb(background.end);
        let gradient = ctx.createLinearGradient(0, 0, canvas.width, 0);
        gradient.addColorStop(0, background.start);
        gradient.addColorStop(1, background.end);
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);
      }
      for (let shape of shapes) {
        drawShape(shape);
      }
      if (ripple) {
        drawRipple(ripple);
      }
      if (trail) {
        drawTrail(trail);
      }
      if (pulse) {
        drawPulse(pulse);
      }
      for (let z of zest) {
        drawZest(z);
      }
    }

    function drawShape(shape) {
      ctx.fillStyle = shape.fill;
      ctx.beginPath();
      ctx.arc(shape.x, shape.y, shape.r, 0, 2 * Math.PI);
      ctx.fill();
      if (shape.outline) {
        ctx.strokeStyle = '#2A2218';
        ctx.lineWidth = 2;
        ctx.stroke();
      }
      if (shape.inner) {
        ctx.fillStyle = shape.inner;
        ctx.beginPath();
        ctx.arc(shape.x, shape.y, shape.r / 2, 0, 2 * Math.PI);
        ctx.fill();
      }
      if (shape.detail) {
        ctx.fillStyle = shape.detail;
        ctx.beginPath();
        ctx.arc(shape.x, shape.y, shape.r / 4, 0, 2 * Math.PI);
        ctx.fill();
      }
    }

    function drawRipple(ripple) {
      ctx.fillStyle = 'white';
      ctx.globalAlpha = ripple.alpha;
      ctx.beginPath();
      ctx.arc(ripple.x, ripple.y, ripple.r, 0, 2 * Math.PI);
      ctx.fill();
      ctx.globalAlpha = 1;
      ripple.alpha -= 0.01;
      ripple.r += 2;
      if (ripple.alpha < 0) {
        ripple = null;
      }
    }

    function drawTrail(trail) {
      ctx.strokeStyle = '#FC913A';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(trail.x1, trail.y1);
      ctx.lineTo(trail.x2, trail.y2);
      ctx.stroke();
      trail.x1 = trail.x2;
      trail.y1 = trail.y2;
    }

    function drawPulse(pulse) {
      ctx.fillStyle = '#FF4E50';
      ctx.globalAlpha = pulse.alpha;
      ctx.beginPath();
      ctx.arc(pulse.x, pulse.y, pulse.r, 0, 2 * Math.PI);
      ctx.fill();
      ctx.globalAlpha = 1;
      pulse.alpha = Math.sin(pulse.t) * 0.5 + 0.5;
      pulse.t += 0.01;
    }

    function drawZest(zest) {
      ctx.fillStyle = '#B4E33D';
      ctx.beginPath();
      ctx.arc(zest.x, zest.y, zest.r, 0, 2 * Math.PI);
      ctx.fill();
      zest.x += zest.vx;
      zest.y += zest.vy;
      zest.r -= 0.1;
      if (zest.r < 0) {
        zest = null;
      }
    }

    function getRandomBackground() {
      let backgrounds = [
        { type: 'solid', color: '#F9D423' },
        { type: 'solid', color: '#FF4E50' },
        { type: 'solid', color: '#B4E33D' },
        { type: 'gradient', start: '#FFECD2', end: '#FFFDE7' },
        { type: 'gradient', start: '#FFE0DD', end: '#FFF8E7' },
        { type: 'gradient', start: '#FFFDE7', end: '#FFF0F0' },
        { type: 'solid', color: '#FF6B81' }
      ];
      return backgrounds[Math.floor(Math.random() * backgrounds.length)];
    }

    function getRandomShape() {
      let fills = ['#FF4E50', '#FC913A', '#F9D423', '#B4E33D', '#FF6B81'];
      let inner = ['#FFF8E7', '#FF4E50', '#FC913A', '#F9D423', '#B4E33D'];
      let detail = ['#FFF8E7', '#FF4E50', '#FC913A', '#F9D423', '#B4E33D'];
      let shape = {
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 50 + 10,
        fill: fills[Math.floor(Math.random() * fills.length)],
        outline: Math.random() < 0.5,
        inner: inner[Math.floor(Math.random() * inner.length)],
        detail: detail[Math.floor(Math.random() * detail.length)],
        vx: Math.random() * 0.5 - 0.25,
        vy: Math.random() * 0.5 - 0.25,
        attractX: Math.random() * canvas.width,
        attractY: Math.random() * canvas.height,
        attractStrength: Math.random() * 0.01 + 0.001
      };
      if (Math.random() < 0.1) {
        shape.fill = '#D4A574';
      }
      return shape;
    }

    function hexToRgb(hex) {
      let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return result ? {
        r: parseInt(result[1], 16),
        g: parseInt(result[2], 16),
        b: parseInt(result[3], 16)
      } : null;
    }

    canvas.addEventListener('touchstart', (e) => {
      let x = e.touches[0].clientX;
      let y = e.touches[0].clientY;
      ripple = { x, y, r: 0, alpha: 1 };
      pulse = { x, y, r: 20, alpha: 0, t: 0 };
      for (let shape of shapes) {
        shape.attractX = x;
        shape.attractY = y;
        shape.attractStrength = Math.random() * 0.05 + 0.01;
      }
    });

    canvas.addEventListener('touchmove', (e) => {
      let x = e.touches[0].clientX;
      let y = e.touches[0].clientY;
      if (trail) {
        trail.x2 = x;
        trail.y2 = y;
      } else {
        trail = { x1: x, y1: y, x2: x, y2: y };
      }
      for (let shape of shapes) {
        shape.attractX = x;
        shape.attractY = y;
        shape.attractStrength = Math.random() * 0.05 + 0.01;
      }
    });

    canvas.addEventListener('touchend', () => {
      for (let i = 0; i < 20; i++) {
        zest.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 10 + 5,
          vx: Math.random() * 2 - 1,
          vy: Math.random() * 2 - 1
        });
      }
      pulse = null;
      trail = null;
      for (let shape of shapes) {
        shape.attractX = Math.random() * canvas.width;
        shape.attractY = Math.random() * canvas.height;
        shape.attractStrength = Math.random() * 0.01 + 0.001;
      }
    });

    canvas.addEventListener('mousedown', (e) => {
      let x = e.clientX;
      let y = e.clientY;
      ripple = { x, y, r: 0, alpha: 1 };
      pulse = { x, y, r: 20, alpha: 0, t: 0 };
      for (let shape of shapes) {
        shape.attractX = x;
        shape.attractY = y;
        shape.attractStrength = Math.random() * 0.05 + 0.01;
      }
    });

    canvas.addEventListener('mousemove', (e) => {
      let x = e.clientX;
      let y = e.clientY;
      if (trail) {
        trail.x2 = x;
        trail.y2 = y;
      } else {
        trail = { x1: x, y1: y, x2: x, y2: y };
      }
      for (let shape of shapes) {
        shape.attractX = x;
        shape.attractY = y;
        shape.attractStrength = Math.random() * 0.05 + 0.01;
      }
    });

    canvas.addEventListener('mouseup', () => {
      for (let i = 0; i < 20; i++) {
        zest.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          r: Math.random() * 10 + 5,
          vx: Math.random() * 2 - 1,
          vy: Math.random() * 2 - 1
        });
      }
      pulse = null;
      trail = null;
      for (let shape of shapes) {
        shape.attractX = Math.random() * canvas.width;
        shape.attractY = Math.random() * canvas.height;
        shape.attractStrength = Math.random() * 0.01 + 0.001;
      }
    });

    init();
    function animate() {
      draw();
      requestAnimationFrame(animate);
    }
    animate();

    function update() {
      for (let shape of shapes) {
        let dx = shape.attractX - shape.x;
        let dy = shape.attractY - shape.y;
        let angle = Math.atan2(dy, dx);
        shape.vx += Math.cos(angle) * shape.attractStrength;
        shape.vy += Math.sin(angle) * shape.attractStrength;
        shape.x += shape.vx;
        shape.y += shape.vy;
        if (shape.x - shape.r < 0 || shape.x + shape.r > canvas.width) {
          shape.vx *= -1;
        }
        if (shape.y - shape.r < 0 || shape.y + shape.r > canvas.height) {
          shape.vy *= -1;
        }
        shape.attractStrength *= 0.99;
      }
      requestAnimationFrame(update);
    }
    update();
  </script>
</body>
</html>
