<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Kandinsky's Paris — Citrus</title>
<style>
*{margin:0;padding:0}
html,body{overflow:hidden;background:#E8F5E9;touch-action:none}
canvas{display:block;width:100vw;height:100dvh}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = innerWidth * devicePixelRatio;
  H = canvas.height = innerHeight * devicePixelRatio;
  ctx.scale(devicePixelRatio, devicePixelRatio);
  W /= devicePixelRatio; H /= devicePixelRatio;
}
resize();
addEventListener('resize', resize);

const FILLS = ['#FF4E50','#FC913A','#F9D423','#B4E33D','#FF6B81','#D4A574'];
const DETAILS = ['#FFF8E7','#FF4E50','#FC913A','#F9D423','#B4E33D','#2D5A27'];

function rng(a,b){return a+Math.random()*(b-a)}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}

class Organism {
  constructor(x, y, size) {
    this.x = x || rng(size, W-size);
    this.y = y || rng(size, H-size);
    this.size = size || rng(20, 90);
    this.color = pick(FILLS);
    this.detail1 = pick(DETAILS);
    this.detail2 = pick(DETAILS);
    this.outlined = Math.random() > 0.4;
    this.vx = rng(-0.3, 0.3);
    this.vy = rng(-0.3, 0.3);
    this.rot = rng(0, Math.PI*2);
    this.rotSpeed = rng(-0.003, 0.003);
    this.breathPhase = rng(0, Math.PI*2);
    this.breathSpeed = rng(0.008, 0.02);
    this.shapeType = Math.floor(rng(0, 5)); // 0=amoeba, 1=kidney, 2=crescent, 3=teardrop, 4=blob
    this.wobbleSeeds = Array.from({length:8}, ()=>rng(0.5,1.5));
    this.alpha = Math.random() > 0.3 ? 0.85 : 0.55;
    this.hasNucleus = Math.random() > 0.3;
    this.hasBands = Math.random() > 0.6;
    this.hasDots = Math.random() > 0.5;
    this.growScale = size ? 0.1 : 1; // spawned ones grow in
  }

  update(t) {
    this.x += this.vx;
    this.y += this.vy;
    this.rot += this.rotSpeed;
    this.breathPhase += this.breathSpeed;
    if (this.growScale < 1) this.growScale = Math.min(1, this.growScale + 0.008);

    // Soft bounce
    const m = this.size * 1.5;
    if (this.x < -m) this.x = W + m;
    if (this.x > W + m) this.x = -m;
    if (this.y < -m) this.y = H + m;
    if (this.y > H + m) this.y = -m;
  }

  draw(t) {
    const breath = 1 + Math.sin(this.breathPhase) * 0.08;
    const s = this.size * breath * this.growScale;
    if (s < 1) return;

    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.globalAlpha = this.alpha;

    // Draw organic shape
    ctx.beginPath();
    const pts = 60;
    for (let i = 0; i <= pts; i++) {
      const a = (i / pts) * Math.PI * 2;
      let r = s;

      // Shape distortion based on type
      switch(this.shapeType) {
        case 0: // amoeba
          r *= 1 + 0.25*Math.sin(a*3 + t*0.01) + 0.15*Math.cos(a*5 + t*0.015);
          break;
        case 1: // kidney
          r *= 1 + 0.35*Math.cos(a) - 0.2*Math.cos(a*2);
          break;
        case 2: // crescent
          r *= 0.7 + 0.4*Math.sin(a + 0.5);
          break;
        case 3: // teardrop
          r *= 0.6 + 0.5*(1+Math.cos(a))/2;
          break;
        case 4: // wobbly blob
          for (let k = 0; k < this.wobbleSeeds.length; k++) {
            r *= 1 + 0.06*Math.sin(a*(k+2) + this.wobbleSeeds[k]*t*0.005);
          }
          break;
      }

      const px = Math.cos(a)*r, py = Math.sin(a)*r;
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();

    ctx.fillStyle = this.color;
    ctx.fill();

    if (this.outlined) {
      ctx.strokeStyle = '#2A2218';
      ctx.lineWidth = Math.max(1, s * 0.03);
      ctx.stroke();
    }

    // Internal details
    if (this.hasNucleus && s > 15) {
      ctx.beginPath();
      const ns = s * 0.3;
      for (let i = 0; i <= 30; i++) {
        const a = (i/30)*Math.PI*2;
        const r2 = ns*(1 + 0.2*Math.sin(a*3 + t*0.02));
        const px = Math.cos(a)*r2, py = Math.sin(a)*r2;
        i === 0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
      }
      ctx.closePath();
      ctx.fillStyle = this.detail1;
      ctx.globalAlpha = 0.7;
      ctx.fill();
    }

    if (this.hasBands && s > 25) {
      ctx.globalAlpha = 0.4;
      ctx.strokeStyle = this.detail2;
      ctx.lineWidth = Math.max(1, s * 0.04);
      for (let b = -2; b <= 2; b++) {
        ctx.beginPath();
        ctx.moveTo(-s*0.6, b*s*0.15);
        ctx.quadraticCurveTo(0, b*s*0.15 + s*0.1*Math.sin(t*0.01+b), s*0.6, b*s*0.15);
        ctx.stroke();
      }
    }

    if (this.hasDots && s > 20) {
      ctx.globalAlpha = 0.6;
      const dotCount = Math.floor(s / 12);
      for (let d = 0; d < dotCount; d++) {
        const da = rng(0, Math.PI*2);
        const dr = rng(0.1, 0.6)*s;
        ctx.beginPath();
        ctx.arc(Math.cos(da)*dr, Math.sin(da)*dr, rng(1.5,4), 0, Math.PI*2);
        ctx.fillStyle = pick(DETAILS);
        ctx.fill();
      }
    }

    ctx.restore();
  }
}

// Scatter particles (tiny elements between organisms)
class Scatter {
  constructor() {
    this.x = rng(0,W); this.y = rng(0,H);
    this.size = rng(2,6);
    this.color = pick(FILLS);
    this.type = Math.floor(rng(0,4)); // 0=dot, 1=dash, 2=triangle, 3=crescent
    this.rot = rng(0,Math.PI*2);
    this.vx = rng(-0.1,0.1);
    this.vy = rng(-0.1,0.1);
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    if (this.x<0) this.x=W; if (this.x>W) this.x=0;
    if (this.y<0) this.y=H; if (this.y>H) this.y=0;
  }
  draw() {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.fillStyle = this.color;
    ctx.globalAlpha = 0.6;
    switch(this.type) {
      case 0:
        ctx.beginPath(); ctx.arc(0,0,this.size,0,Math.PI*2); ctx.fill(); break;
      case 1:
        ctx.fillRect(-this.size*2,-this.size*0.4,this.size*4,this.size*0.8); break;
      case 2:
        ctx.beginPath(); ctx.moveTo(0,-this.size); ctx.lineTo(this.size,this.size); ctx.lineTo(-this.size,this.size); ctx.closePath(); ctx.fill(); break;
      case 3:
        ctx.beginPath(); ctx.arc(0,0,this.size,0.3,Math.PI-0.3); ctx.stroke(); break;
    }
    ctx.restore();
  }
}

// Create organisms
const organisms = [];
for (let i = 0; i < 12; i++) {
  organisms.push(new Organism(null, null, rng(25, 100)));
}
// A few large anchor shapes
for (let i = 0; i < 3; i++) {
  organisms.push(new Organism(rng(W*0.15,W*0.85), rng(H*0.15,H*0.85), rng(80, 140)));
}
// Scatter particles
const scatters = Array.from({length: 40}, () => new Scatter());

// Touch to spawn
canvas.addEventListener('pointerdown', (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  organisms.push(new Organism(x, y, rng(15, 60)));
});

let t = 0;
function draw() {
  t++;
  // Gradient background
  const grad = ctx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#E8F5E9');
  grad.addColorStop(1, '#FFF8E7');
  ctx.globalAlpha = 1;
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Draw scatter first (behind)
  for (const s of scatters) { s.update(); s.draw(); }

  // Sort by size for layering
  organisms.sort((a,b) => b.size - a.size);

  for (const o of organisms) {
    o.update(t);
    o.draw(t);
  }

  // Limit organism count
  if (organisms.length > 30) organisms.splice(0, organisms.length - 30);

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
